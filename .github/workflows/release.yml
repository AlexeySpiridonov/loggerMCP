name: Build & Publish APT Repo

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils

      - name: Build .deb package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#.}"

          bash ./scripts/build-deb.sh "${VERSION}" ${{ matrix.arch }}

      - name: Write build summary
        run: |
          {
            echo "## Release build artifacts (${{ matrix.arch }})"
            echo
            echo "Artifact name: \`deb-${{ matrix.arch }}\`"
            echo
            echo "Files:"
            echo
            for file in build/*.deb build/loggermcp-linux-*; do
              if [ -e "$file" ]; then
                echo "- \`$(basename "$file")\`"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: |
            build/*.deb
            build/loggermcp-linux-*

  publish-apt:
    needs: build-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils

      - uses: actions/download-artifact@v4
        with:
          path: debs
          merge-multiple: true

      - name: Write release asset summary
        run: |
          {
            echo "## Release assets"
            echo
            echo "Downloaded files:"
            echo
            for file in debs/*; do
              if [ -e "$file" ]; then
                echo "- \`$(basename "$file")\`"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -euo pipefail
          umask 077

          if [ -z "${GPG_PRIVATE_KEY}" ]; then
            echo "Missing GitHub Actions secret: GPG_PRIVATE_KEY" >&2
            exit 1
          fi

          if [ -z "${GPG_KEY_ID}" ]; then
            echo "Missing GitHub Actions secret: GPG_KEY_ID" >&2
            exit 1
          fi

          if ! printf '%s' "${GPG_PRIVATE_KEY}" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
            echo "GPG_PRIVATE_KEY must be an ASCII-armored private key block." >&2
            exit 1
          fi

          printf '%s\n' "${GPG_PRIVATE_KEY}" > /tmp/gpg-private-key.asc
          gpg --batch --import /tmp/gpg-private-key.asc
          gpg --batch --list-secret-keys "${GPG_KEY_ID}" > /dev/null
          printf '%s' "${GPG_PASSPHRASE}" > /tmp/gpg-passphrase

      - name: Build APT repository
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p apt-repo/pool/main
          mkdir -p apt-repo/dists/stable/main/binary-amd64
          mkdir -p apt-repo/dists/stable/main/binary-arm64

          # Copy .deb packages
          cp debs/*.deb apt-repo/pool/main/

          cd apt-repo

          # Generate Packages for each architecture
          for ARCH in amd64 arm64; do
            dpkg-scanpackages --arch ${ARCH} pool/ > dists/stable/main/binary-${ARCH}/Packages
            gzip -k dists/stable/main/binary-${ARCH}/Packages
          done

          # Generate Release
          printf '%s\n' \
            'Origin: loggerMCP' \
            'Label: loggerMCP' \
            'Suite: stable' \
            'Codename: stable' \
            'Architectures: amd64 arm64' \
            'Components: main' \
            'Description: loggerMCP APT repository' \
            > dists/stable/Release

          # Append hashes
          cd dists/stable
          apt-ftparchive release . >> Release

          # Sign Release with GPG
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file /tmp/gpg-passphrase \
            --default-key "${GPG_KEY_ID}" \
            -abs -o Release.gpg Release

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file /tmp/gpg-passphrase \
            --default-key "${GPG_KEY_ID}" \
            --clearsign -o InRelease Release

      - name: Export public GPG key
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          gpg --armor --export "${GPG_KEY_ID}" > apt-repo/public.gpg

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          force_orphan: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            debs/*.deb
            debs/loggermcp-linux-*
          generate_release_notes: true
